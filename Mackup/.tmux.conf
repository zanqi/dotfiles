# ==========================
# General Settings
# ==========================
set -g mouse on
setw -g mode-keys vi
# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Setup 'y' to yank (copy), similar to Vim
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Remap prefix to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config file
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# ==========================
# Window Management
# ==========================
# Open new window
bind c new-window -c "#{pane_current_path}"

# Cycle windows
bind -n M-[ previous-window
bind -n M-] next-window
bind Escape copy-mode # Rebind copy mode since we used [

# ==========================
# Window Splitting
# ==========================
# 1. No-Prefix splits (Option/Alt + hjkl)
bind -n M-l split-window -h -c "#{pane_current_path}"  # Right
bind -n M-h split-window -hb -c "#{pane_current_path}" # Left
bind -n M-j split-window -v -c "#{pane_current_path}"  # Down
bind -n M-k split-window -vb -c "#{pane_current_path}" # Up

# 2. Prefix splits (Prefix + hjkl) - Fixed logic!
bind l split-window -h -c "#{pane_current_path}"  # Right
bind h split-window -hb -c "#{pane_current_path}" # Left
bind j split-window -v -c "#{pane_current_path}"  # Down
bind k split-window -vb -c "#{pane_current_path}" # Up
unbind '"'
unbind %

# The Omarchy "tdl" IDE Layout (Prefix + D)
bind D split-window -h -c "#{pane_current_path}" -p 35 \; split-window -v -c "#{pane_current_path}" -p 30 \; select-pane -t 0

# ==========================
# Seamless LazyVim + Tmux Navigation
# ==========================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind C-h send-keys 'C-h'
bind C-j send-keys 'C-j'
bind C-k send-keys 'C-k'
bind C-l send-keys 'C-l' # Prefix + C-l to clear screen

# ==========================
# Status Bar Aesthetics
# ==========================
set-option -g status-position top
set -g status-style bg=default,fg=#cdd6f4
set -g window-status-format " #I:#W "
set -g window-status-style bg=default,fg=#6c7086
set -g window-status-current-format " #I:#W "
set -g window-status-current-style bg=#89b4fa,fg=#11111b,bold
set -g status-left " #[fg=#a6e3a1,bold][#S] "
set -g status-left-length 20
set -g status-right "#[fg=#bac2de] %b %d %Y %l:%M %p "

# ==========================
# Nested Tmux Toggle
# ==========================
# Press F12 to disable local tmux bindings and send all keystrokes to remote.
# Press F12 again to re-enable local tmux bindings.

bind -T root 'C-\'  \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=#f38ba8,fg=#11111b,bold" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off 'C-\' \
  set -u prefix \;\
  set -u key-table \;\
  set status-style bg=default,fg=#cdd6f4 \;\
  refresh-client -S
